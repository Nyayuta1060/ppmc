name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux bundles
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build --bundles appimage,deb

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p release-assets

          appimage=$(find src-tauri/target/release/bundle/appimage -type f -name '*.AppImage' | head -n 1)
          deb=$(find src-tauri/target/release/bundle/deb -type f -name '*.deb' | head -n 1)

          cp "$appimage" "release-assets/ppmc-${tag}-linux-x86_64.AppImage"
          cp "$deb" "release-assets/ppmc-${tag}-linux-x86_64.deb"

          (
            cd release-assets
            sha256sum * > SHA256SUMS
            sha256sum "ppmc-${tag}-linux-x86_64.AppImage" > "ppmc-${tag}-linux-x86_64.AppImage.sha256"
          )

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
